<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vkino - вход</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="login.js" defer></script>
</head>
<body>

<div class="container-main">
        <span class="bg-dot yellow" style="width:180px;height:180px;left:50px;top:60px;"></span>
        <span class="bg-dot light" style="width:150px;height:150px;left:300px;top:-30px;"></span>
        <span class="bg-dot yellow" style="width:200px;height:200px;right:260px;top:220px;"></span>
        <span class="bg-dot light" style="width:160px;height:160px;left:20px;bottom:120px;"></span>
        <span class="bg-dot light" style="width:210px;height:210px;right:60px;bottom:30px;"></span>
        <span class="bg-dot yellow" style="width:170px;height:170px;right:20px;top:40px;"></span>
        <span class="bg-dot yellow" style="width:140px;height:140px;left:160px;bottom:-60px;"></span>
        <span class="bg-dot light" style="width:190px;height:190px;right:-40px;top:120px;"></span>

        <div class="form-section">
            <div class="form-wrap">
                <div class="logo">
                    <img src="img/logo.png" alt="VKino логотип">Vkino
                </div>
                <form>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <div class="field has-eye">
                            <input id="password" type="password" placeholder="Пароль" required>
                            <button class="eye-btn" type="button" aria-label="Показать пароль" data-target="password">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M2.5 12C4.4 8.6 7.7 6.2 12 6.2C16.3 6.2 19.6 8.6 21.5 12C19.6 15.4 16.3 17.8 12 17.8C7.7 17.8 4.4 15.4 2.5 12Z" stroke="currentColor" stroke-width="1.8"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                                    <path class="slash" d="M5 19L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn">Войти</button>
                </form>
                <div class="footer-text">
                    Нет аккаунта? <a href="#">Зарегистрироваться</a>
                </div>
            </div>

            <div class="popcorn-wrap">
                <div class="scene" id="scene">
                <!-- Glow effect -->
                <div class="glow"></div>

                <!-- Popcorn kernels - many of them with varied positions -->
                <!-- Each kernel: --tx (horizontal offset), --ty (vertical rise), --rot, --delay, --dur -->

                <svg class="kernel" style="--tx:-70px;--ty:-160px;--rot:200deg;--delay:0s;--dur:0.9s;width:28px;height:28px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="10" ry="8" fill="#fff9e3" transform="rotate(20)"/><circle cx="-4" cy="-3" r="7" fill="#fffde7"/><circle cx="4" cy="-4" r="6" fill="#fff8e1"/><circle cx="0" cy="3" r="6" fill="#fffde7"/><circle cx="-3" cy="2" r="4" fill="white" opacity="0.5"/></g></svg>

                <svg class="kernel" style="--tx:70px;--ty:-140px;--rot:-150deg;--delay:0.1s;--dur:0.85s;width:26px;height:26px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffe082" transform="rotate(-15)"/><circle cx="-3" cy="-4" r="7" fill="#fff9c4"/><circle cx="4" cy="-3" r="6" fill="#ffe082"/><circle cx="1" cy="4" r="5" fill="#fff9c4"/><circle cx="-2" cy="1" r="3" fill="white" opacity="0.45"/></g></svg>

                <svg class="kernel" style="--tx:-30px;--ty:-180px;--rot:280deg;--delay:0.2s;--dur:1s;width:30px;height:30px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="11" ry="8" fill="#fff8e1" transform="rotate(35)"/><circle cx="-5" cy="-2" r="7" fill="#fffde7"/><circle cx="3" cy="-5" r="7" fill="#ffe082"/><circle cx="1" cy="4" r="6" fill="#fff9c4"/><circle cx="-3" cy="0" r="3" fill="white" opacity="0.5"/></g></svg>

                <svg class="kernel" style="--tx:50px;--ty:-170px;--rot:-90deg;--delay:0.05s;--dur:0.75s;width:24px;height:24px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffe082" transform="rotate(10)"/><circle cx="-4" cy="-4" r="6" fill="#fff9c4"/><circle cx="4" cy="-3" r="6" fill="#ffe082"/><circle cx="0" cy="4" r="5" fill="#fffde7"/><circle cx="-1" cy="-1" r="3" fill="white" opacity="0.4"/></g></svg>

                <svg class="kernel" style="--tx:-90px;--ty:-100px;--rot:120deg;--delay:0.3s;--dur:0.95s;width:28px;height:28px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="10" ry="8" fill="#fff9e3" transform="rotate(-30)"/><circle cx="-3" cy="-5" r="7" fill="#fff8e1"/><circle cx="5" cy="-2" r="6" fill="#ffe082"/><circle cx="-1" cy="5" r="6" fill="#fffde7"/><circle cx="2" cy="-2" r="3" fill="white" opacity="0.5"/></g></svg>

                <svg class="kernel" style="--tx:90px;--ty:-110px;--rot:-200deg;--delay:0.15s;--dur:0.88s;width:26px;height:26px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffe082" transform="rotate(50)"/><circle cx="-4" cy="-3" r="6" fill="#fff9c4"/><circle cx="4" cy="-4" r="6" fill="#fff8e1"/><circle cx="1" cy="4" r="5" fill="#ffe082"/><circle cx="-2" cy="0" r="3" fill="white" opacity="0.45"/></g></svg>

                <svg class="kernel" style="--tx:10px;--ty:-200px;--rot:360deg;--delay:0.25s;--dur:1.1s;width:32px;height:32px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="11" ry="9" fill="#fff9c4" transform="rotate(-20)"/><circle cx="-5" cy="-3" r="8" fill="#fffde7"/><circle cx="4" cy="-5" r="7" fill="#ffe082"/><circle cx="0" cy="5" r="7" fill="#fff9c4"/><circle cx="-2" cy="-1" r="4" fill="white" opacity="0.45"/></g></svg>

                <svg class="kernel" style="--tx:-50px;--ty:-130px;--rot:45deg;--delay:0.4s;--dur:0.7s;width:24px;height:24px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="8" ry="6" fill="#ffe082" transform="rotate(60)"/><circle cx="-3" cy="-3" r="6" fill="#fff9c4"/><circle cx="3" cy="-3" r="5" fill="#fff8e1"/><circle cx="0" cy="4" r="5" fill="#ffe082"/><circle cx="-1" cy="0" r="3" fill="white" opacity="0.4"/></g></svg>

                <svg class="kernel" style="--tx:30px;--ty:-150px;--rot:-270deg;--delay:0.35s;--dur:0.92s;width:27px;height:27px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="10" ry="7" fill="#fff8e1" transform="rotate(-45)"/><circle cx="-4" cy="-4" r="7" fill="#fffde7"/><circle cx="4" cy="-3" r="6" fill="#ffe082"/><circle cx="1" cy="5" r="6" fill="#fff9c4"/><circle cx="-2" cy="1" r="3" fill="white" opacity="0.5"/></g></svg>

                <svg class="kernel" style="--tx:-110px;--ty:-80px;--rot:170deg;--delay:0.45s;--dur:0.82s;width:25px;height:25px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffe082" transform="rotate(25)"/><circle cx="-4" cy="-3" r="6" fill="#fff9c4"/><circle cx="4" cy="-4" r="6" fill="#fff8e1"/><circle cx="0" cy="4" r="5" fill="#ffe082"/><circle cx="-1" cy="-1" r="3" fill="white" opacity="0.45"/></g></svg>

                <svg class="kernel" style="--tx:110px;--ty:-90px;--rot:-130deg;--delay:0.08s;--dur:1.05s;width:29px;height:29px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="10" ry="8" fill="#fff9c4" transform="rotate(-10)"/><circle cx="-5" cy="-2" r="7" fill="#fffde7"/><circle cx="3" cy="-5" r="6" fill="#ffe082"/><circle cx="1" cy="5" r="6" fill="#fff9c4"/><circle cx="-2" cy="0" r="3" fill="white" opacity="0.4"/></g></svg>

                <svg class="kernel" style="--tx:-15px;--ty:-220px;--rot:320deg;--delay:0.5s;--dur:0.78s;width:26px;height:26px" viewBox="0 0 40 40"><g transform="translate(20,20)"><ellipse cx="0" cy="0" rx="9" ry="7" fill="#ffe082" transform="rotate(40)"/><circle cx="-3" cy="-4" r="6" fill="#fff9c4"/><circle cx="4" cy="-3" r="6" fill="#fff8e1"/><circle cx="0" cy="4" r="5" fill="#fffde7"/><circle cx="-1" cy="-1" r="3" fill="white" opacity="0.45"/></g></svg>

                <!-- Bucket SVG -->
                <div class="bucket-wrap">
                    <svg class="bucket-svg" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
                    <!-- Bucket body trapezoid -->
                    <defs>
                        <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#c0392b"/>
                        <stop offset="30%"  stop-color="#e74c3c"/>
                        <stop offset="60%"  stop-color="#c0392b"/>
                        <stop offset="100%" stop-color="#922b21"/>
                        </linearGradient>
                        <linearGradient id="stripGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%"   stop-color="#f9e04b"/>
                        <stop offset="50%"  stop-color="#fff176"/>
                        <stop offset="100%" stop-color="#f9e04b"/>
                        </linearGradient>
                        <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%"   stop-color="#f5cba7"/>
                        <stop offset="100%" stop-color="#d4ac0d"/>
                        </linearGradient>
                    </defs>

                    <!-- Main bucket body -->
                    <polygon points="20,40 140,40 125,175 35,175" fill="url(#bucketGrad)"/>

                    <!-- Stripes -->
                    <clipPath id="bucketClip">
                        <polygon points="20,40 140,40 125,175 35,175"/>
                    </clipPath>
                    <g clip-path="url(#bucketClip)">
                        <rect x="40" y="38" width="22" height="140" fill="url(#stripGrad)" opacity="0.9"/>
                        <rect x="98" y="38" width="22" height="140" fill="url(#stripGrad)" opacity="0.9"/>
                    </g>

                    <!-- Rim at top -->
                    <rect x="15" y="33" width="130" height="14" rx="7" fill="url(#rimGrad)"/>

                    <!-- Bottom flat -->
                    <rect x="34" y="170" width="92" height="8" rx="4" fill="#7b241c"/>

                    <!-- Popcorn pile on top -->
                    <!-- big fluffy clouds of popcorn -->
                    <ellipse cx="80" cy="38" rx="52" ry="22" fill="#ffe082"/>
                    <circle cx="50" cy="28" r="18" fill="#fff9c4"/>
                    <circle cx="75" cy="18" r="20" fill="#ffe082"/>
                    <circle cx="100" cy="24" r="17" fill="#fff9c4"/>
                    <circle cx="120" cy="32" r="15" fill="#ffe082"/>
                    <circle cx="35" cy="35" r="13" fill="#ffcc02"/>
                    <circle cx="62" cy="10" r="14" fill="#fff8e1"/>
                    <circle cx="90" cy="8"  r="13" fill="#ffe082"/>
                    <circle cx="110" cy="15" r="12" fill="#fff9c4"/>

                    <!-- little highlights -->
                    <circle cx="55" cy="22" r="5" fill="white" opacity="0.4"/>
                    <circle cx="82" cy="12" r="4" fill="white" opacity="0.3"/>
                    <circle cx="105" cy="20" r="4" fill="white" opacity="0.35"/>

                    <!-- shine on bucket -->
                    <polygon points="30,50 50,50 45,140 28,140" fill="white" opacity="0.07"/>
                    </svg>
                </div>
                </div>

                <p class="hint">Наведи мышку на ведёрко ✨</p>

            </div>
    </div>

    <script>
    </script>
</body>
</html>
