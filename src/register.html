<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vkino - регистрация</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/register.css">
    <script type="module" src="register.js" defer></script>
</head>
<body>
    <canvas id="fx"></canvas>

<div class="container-main">
        <span class="bg-dot yellow" style="width:180px;height:180px;left:50px;top:60px;"></span>
        <span class="bg-dot light" style="width:150px;height:150px;left:300px;top:-30px;"></span>
        <span class="bg-dot yellow" style="width:200px;height:200px;right:260px;top:220px;"></span>
        <span class="bg-dot light" style="width:160px;height:160px;left:20px;bottom:120px;"></span>
        <span class="bg-dot light" style="width:210px;height:210px;right:60px;bottom:30px;"></span>
        <span class="bg-dot yellow" style="width:170px;height:170px;right:20px;top:40px;"></span>
        <span class="bg-dot yellow" style="width:140px;height:140px;left:160px;bottom:-60px;"></span>
        <span class="bg-dot light" style="width:190px;height:190px;right:-40px;top:120px;"></span>

        <div class="form-section">
            <div class="form-wrap">
                <div class="logo">
                    <img src="img/logo.png" alt="VKino логотип">Vkino
                </div>
                <form>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="Начните вводить" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <div class="field has-eye">
                            <input id="password" type="password" placeholder="Начните вводить" required>
                            <button class="eye-btn" type="button" aria-label="Показать пароль" data-target="password">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M2.5 12C4.4 8.6 7.7 6.2 12 6.2C16.3 6.2 19.6 8.6 21.5 12C19.6 15.4 16.3 17.8 12 17.8C7.7 17.8 4.4 15.4 2.5 12Z" stroke="currentColor" stroke-width="1.8"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                                    <path class="slash" d="M5 19L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Повтор пароля</label>
                        <div class="field has-eye">
                            <input id="password-repeat" type="password" placeholder="Начните вводить" required>
                            <button class="eye-btn" type="button" aria-label="Показать пароль" data-target="password-repeat">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                                    <path d="M2.5 12C4.4 8.6 7.7 6.2 12 6.2C16.3 6.2 19.6 8.6 21.5 12C19.6 15.4 16.3 17.8 12 17.8C7.7 17.8 4.4 15.4 2.5 12Z" stroke="currentColor" stroke-width="1.8"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
                                    <path class="slash" d="M5 19L19 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn">Зарегистрироваться</button>
                </form>
                <div class="footer-text">
                    Уже есть аккаунт? <a href="#">Войти</a>
                </div>
            </div>

            <div class="bottle-wrap">
                <div id="scene">
                    <div id="puddle"></div>
                    <div id="stream"></div>

                    <div id="bw">
                        <svg viewBox="0 0 190 540" fill="none" xmlns="http://www.w3.org/2000/svg"
                             width="100%" height="100%"
                             style="filter:drop-shadow(0 28px 55px rgba(0,0,0,.9)) drop-shadow(0 0 30px rgba(160,80,0,.1))">
                        <defs>
                            <!-- Dark brown glass body gradient -->
                            <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="#080503"/>
                                <stop offset="8%"   stop-color="#140d08"/>
                                <stop offset="22%"  stop-color="#20140e"/>
                                <stop offset="42%"  stop-color="#2a1a12"/>
                                <stop offset="58%"  stop-color="#251610"/>
                                <stop offset="76%"  stop-color="#180f08"/>
                                <stop offset="92%"  stop-color="#0e0905"/>
                                <stop offset="100%" stop-color="#070402"/>
                            </linearGradient>

                            <!-- Neck gradient -->
                            <linearGradient id="neckG" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="#0c0806"/>
                                <stop offset="35%"  stop-color="#1c1209"/>
                                <stop offset="65%"  stop-color="#24170c"/>
                                <stop offset="100%" stop-color="#0c0806"/>
                            </linearGradient>

                            <!-- Orange label gradient -->
                            <linearGradient id="lblG" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="#5c2200"/>
                                <stop offset="10%"  stop-color="#a84010"/>
                                <stop offset="30%"  stop-color="#d45a18"/>
                                <stop offset="50%"  stop-color="#e8721e"/>
                                <stop offset="70%"  stop-color="#d45a18"/>
                                <stop offset="90%"  stop-color="#a84010"/>
                                <stop offset="100%" stop-color="#5c2200"/>
                            </linearGradient>

                            <!-- Label wave highlight -->
                            <linearGradient id="wvG" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="white" stop-opacity="0"/>
                                <stop offset="20%"  stop-color="white" stop-opacity=".45"/>
                                <stop offset="50%"  stop-color="white" stop-opacity=".6"/>
                                <stop offset="80%"  stop-color="white" stop-opacity=".45"/>
                                <stop offset="100%" stop-color="white" stop-opacity="0"/>
                            </linearGradient>

                            <!-- Orange cap gradient -->
                            <linearGradient id="cpG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%"   stop-color="#ff8c45"/>
                                <stop offset="60%"  stop-color="#d4580e"/>
                                <stop offset="100%" stop-color="#8d3000"/>
                            </linearGradient>

                            <!-- Dark cola liquid -->
                            <linearGradient id="lqG" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%"   stop-color="#1e0c06" stop-opacity=".96"/>
                                <stop offset="100%" stop-color="#090302" stop-opacity=".99"/>
                            </linearGradient>

                            <!-- Left glass highlight (bright) -->
                            <linearGradient id="hlL" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="white" stop-opacity=".28"/>
                                <stop offset="100%" stop-color="white" stop-opacity="0"/>
                            </linearGradient>

                            <!-- Left glass highlight (soft) -->
                            <linearGradient id="hlL2" x1="0" y1="0" x2="1" y2="0">
                                <stop offset="0%"   stop-color="white" stop-opacity=".10"/>
                                <stop offset="100%" stop-color="white" stop-opacity="0"/>
                            </linearGradient>

                            <!-- Classic contour bottle shape -->
                            <path id="bp" d="
                                M83 28
                                C83 28 80 30 80 44
                                L80 95
                                C75 108 55 122 38 152
                                L30 168
                                C28 185 28 200 30 222
                                C32 242 44 264 46 292
                                L46 314
                                C43 340 28 366 26 404
                                L26 452
                                C26 472 34 488 95 492
                                C156 488 164 472 164 452
                                L164 404
                                C162 366 147 340 144 314
                                L144 292
                                C146 264 158 242 160 222
                                C162 200 162 185 160 168
                                L152 152
                                C135 122 115 108 110 95
                                L110 44
                                C110 30 107 28 107 28
                                Z
                            "/>

                            <clipPath id="bc"><use href="#bp"/></clipPath>
                        </defs>

                        <!-- Bottle body -->
                        <use href="#bp" fill="url(#body)" stroke="#1c1208" stroke-width="1"/>

                        <!-- Cola liquid fill -->
                        <g clip-path="url(#bc)">
                            <rect x="26" y="168" width="138" height="324" fill="url(#lqG)"/>
                            <circle cx="55"  cy="390" r="3.5" fill="rgba(255,255,255,.04)"/>
                            <circle cx="145" cy="320" r="4.5" fill="rgba(255,255,255,.03)"/>
                            <circle cx="82"  cy="462" r="3"   fill="rgba(255,255,255,.04)"/>
                            <circle cx="36"  cy="280" r="5"   fill="rgba(255,255,255,.025)"/>
                            <circle cx="118" cy="248" r="2"   fill="rgba(255,255,255,.04)"/>
                        </g>

                        <!-- Label -->
                        <path d="
                            M30 168 L160 168 L160 364
                            C130 372 95 374 95 374
                            C95 374 60 372 30 364 Z
                        " fill="url(#lblG)"/>

                        <!-- Label top white stripe -->
                        <path d="
                            M30 168 L160 168 L160 184
                            C130 176 95 173 95 173
                            C95 173 60 176 30 184 Z
                        " fill="white" fill-opacity=".88"/>

                        <!-- Label bottom white stripe -->
                        <path d="
                            M30 348 C60 353 95 355 95 355
                            C95 355 130 353 160 348
                            L160 364
                            C130 372 95 374 95 374
                            C95 374 60 372 30 364 Z
                        " fill="white" fill-opacity=".88"/>

                        <!-- COLA label text -->
                        <foreignObject x="20" y="208" width="150" height="62">
                            <div xmlns="http://www.w3.org/1999/xhtml" style="
                                font-family:'Arial Black',Arial,sans-serif;
                                font-size:52px;font-weight:900;
                                color:white;text-align:center;
                                line-height:1;
                                text-shadow:1px 2px 0 rgba(0,0,0,.4),2px 4px 10px rgba(0,0,0,.5);
                                letter-spacing:2px;white-space:nowrap;
                            ">COLA</div>
                        </foreignObject>

                        <!-- Wave decorations on label -->
                        <path d="M30 272 Q60 257 95 265 Q130 273 160 258"
                              stroke="url(#wvG)" stroke-width="12" fill="none" stroke-linecap="round"/>
                        <path d="M30 290 Q60 275 95 283 Q130 291 160 276"
                              stroke="url(#wvG)" stroke-width="5" fill="none" stroke-linecap="round" opacity=".3"/>

                        <!-- Label edge shadows (curved feel) -->
                        <path d="M30 168 L30 364 L40 368 L40 164 Z" fill="rgba(0,0,0,.18)"/>
                        <path d="M160 168 L160 364 L150 368 L150 164 Z" fill="rgba(0,0,0,.18)"/>

                        <!-- Shoulder / neck area (glass overlay above label) -->
                        <path d="
                            M80 95
                            C75 108 55 122 38 152
                            L30 168 L160 168 L152 152
                            C135 122 115 108 110 95 Z
                        " fill="url(#neckG)" opacity=".9"/>

                        <!-- Neck tube -->
                        <rect x="80" y="28" width="30" height="68" rx="3" fill="url(#neckG)"/>

                        <!-- Neck collar ring -->
                        <ellipse cx="95" cy="92" rx="16" ry="4" fill="#0c0c1a" stroke="#1e1e2e" stroke-width="1.2"/>

                        <!-- Neck left highlight -->
                        <path d="M82 30 L82 92 L86 90 L86 30 Z" fill="url(#hlL)" opacity=".5"/>

                        <!-- Body left bright glass reflection -->
                        <path d="
                            M26 160 L26 450
                            Q31 452 36 450
                            L37 164
                            Q31 162 26 160 Z
                        " fill="url(#hlL)" opacity=".52"/>

                        <!-- Body left secondary soft reflection -->
                        <path d="
                            M38 156 L38 448
                            L45 448 L45 160 Z
                        " fill="url(#hlL2)" opacity=".55"/>

                        <!-- Subtle horizontal glass texture rings -->
                        <path d="M26 224 Q95 220 164 224" stroke="rgba(255,255,255,.04)" stroke-width="3" fill="none"/>
                        <path d="M26 312 Q95 308 164 312" stroke="rgba(255,255,255,.04)" stroke-width="3" fill="none"/>
                        <path d="M26 398 Q95 394 164 398" stroke="rgba(0,0,0,.2)"         stroke-width="2.5" fill="none"/>

                        <!-- Bottom reflection -->
                        <path d="
                            M26 452 Q95 447 164 452
                            Q164 463 95 467
                            Q26 463 26 452 Z
                        " fill="rgba(0,0,0,.12)"/>

                        <!-- Cap -->
                        <g id="capG">
                            <rect x="79" y="4" width="32" height="26" rx="5" fill="url(#cpG)"/>
                            <ellipse cx="95" cy="4"   rx="16" ry="5.5" fill="#ee6820"/>
                            <ellipse cx="91" cy="2.5" rx="9"  ry="2.8" fill="white" fill-opacity=".32"/>
                            <line x1="82"   y1="5"   x2="82"   y2="29" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="85.5" y1="4.5" x2="85.5" y2="30" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="89"   y1="4"   x2="89"   y2="30" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="95"   y1="4"   x2="95"   y2="30" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="101"  y1="4"   x2="101"  y2="30" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="104.5" y1="4.5" x2="104.5" y2="30" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <line x1="108"  y1="5"   x2="108"  y2="29" stroke="#7a2a00" stroke-width="1" opacity=".65"/>
                            <ellipse cx="95" cy="29" rx="16" ry="3" fill="#aa4400" fill-opacity=".8"/>
                            <ellipse cx="95" cy="29" rx="16" ry="3" fill="none" stroke="#663300" stroke-width=".8"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
    </script>
</body>
</html>
